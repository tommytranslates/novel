<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovelNest — Read Free Novels Online</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="logo">Novel<span>Nest</span></div>
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search novels or authors…">
      </div>
    </div>
  </header>

  <main class="container">

    <div class="filters" id="filters">
      <button class="filter-btn active" data-genre="all">All</button>
      <button class="filter-btn" data-genre="fantasy">Fantasy</button>
      <button class="filter-btn" data-genre="romance">Romance</button>
      <button class="filter-btn" data-genre="sci-fi">Sci-Fi</button>
      <button class="filter-btn" data-genre="thriller">Thriller</button>
      <button class="filter-btn" data-genre="action">Action</button>
      <button class="filter-btn" data-genre="general">General</button>
    </div>

    <p class="section-title" id="section-label">All Novels</p>
    <div class="novel-grid" id="novel-grid">
      <div class="loading">Loading novels…</div>
    </div>

  </main>

  <script>
    let allNovels = [];

    async function loadNovels() {
      try {
        const res = await fetch('/api/novels');
        allNovels = await res.json();
        renderNovels(allNovels);
      } catch (err) {
        document.getElementById('novel-grid').innerHTML =
          '<p class="error">Could not load novels. Check your Cloudflare environment variables.</p>';
      }
    }

    function renderNovels(novels) {
      const grid = document.getElementById('novel-grid');
      document.getElementById('section-label').textContent =
        novels.length + ' novel' + (novels.length !== 1 ? 's' : '');

      if (!novels.length) {
        grid.innerHTML = '<p class="empty">No novels yet — add one in your Supabase table!</p>';
        return;
      }

      grid.innerHTML = novels.map(n => {
        const hasCover = n.cover_url && n.cover_url.trim();
        const coverStyle = hasCover ? `background-image:url('${n.cover_url}')` : '';
        return `
          <a href="novel.html?id=${n.id}" class="novel-card">
            <div class="cover" style="${coverStyle}">
              ${!hasCover ? `<span class="cover-initial">${n.title.charAt(0)}</span>` : ''}
              <span class="status-badge ${n.status || 'ongoing'}">${n.status === 'completed' ? 'Done' : 'Ongoing'}</span>
            </div>
            <div class="card-info">
              <h3 class="novel-title">${n.title}</h3>
              <p class="novel-author">by ${n.author}</p>
              <span class="genre-tag">${n.genre || 'General'}</span>
            </div>
          </a>`;
      }).join('');
    }

    /* Search */
    document.getElementById('search').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      const filtered = allNovels.filter(n =>
        n.title.toLowerCase().includes(q) || n.author.toLowerCase().includes(q)
      );
      renderNovels(filtered);
    });

    /* Genre filter */
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const genre = this.dataset.genre;
        const filtered = genre === 'all'
          ? allNovels
          : allNovels.filter(n => (n.genre || 'General').toLowerCase() === genre);
        renderNovels(filtered);
      });
    });

    loadNovels();
  </script>

</body>
</html>
