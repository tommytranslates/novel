<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TommyTranslates</title>

<!-- <link rel="stylesheet" href="style.css"> -->
<script src="theme.js"></script>
<script async
  src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3831106890582078"
  crossorigin="anonymous"></script>
<link href="https://cdn.jsdelivr.net/npm/beercss@3.4.3/dist/cdn/beer.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/beercss@3.4.3/dist/cdn/beer.min.js" type="module"></script>
</head>

<body>

<nav class="primary-container on-primary-text no-margin padding">

  <a href="index.html"><h5 class="no-margin on-primary-text">Tommy <b>Translates</b>
      </h5></a>


  <a href="index.html" class="button small-round large transparent l">Home</a>
  <a href="#" id="novel-link" class="button small-round large transparent l">Novel</a>
  
  <div class="max truncate m l"></div> <button class="circle large transparent" id="smaller" aria-label="Decrease font size">
    <i>text_decrease</i>
    <span class="badge none">A-</span>
  </button>
  
  <button class="circle large transparent" id="bigger" aria-label="Increase font size">
    <i>text_increase</i>
    <span class="badge none">A+</span>
  </button>

<button class="circle large transparent" onclick="toggleTheme()">   
   <i>dark_mode</i>
  </button>
</nav>

<div class="reader-body margin" id="reader-body">
  <div class="loading">Loading chapter...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const chapterId = params.get('id');
const novelId = params.get('novel');

if (!chapterId || !novelId) {
  window.location.href = 'index.html';
}

let currentFontSize = 28;
let currentChapter = null;
let allChapters = [];

// ── In-memory chapter content cache ──
const chapterCache = {};

async function fetchChapter(id) {
  if (chapterCache[id]) return chapterCache[id];
  const res = await fetch('/api/chapter/' + id);
  const data = await res.json();
  if (data && data.id) chapterCache[id] = data;
  return data;
}

// ── Chapter list cache (survives page loads within the same tab) ──
async function fetchChapterList(novelId) {
  const cacheKey = 'chapterlist_' + novelId;
  const cached = sessionStorage.getItem(cacheKey);
  if (cached) return JSON.parse(cached);

  const res = await fetch('/api/chapters/' + novelId);
  const data = await res.json();
  if (Array.isArray(data)) sessionStorage.setItem(cacheKey, JSON.stringify(data));
  return data;
}

document.getElementById('bigger').addEventListener('click', () => {
  currentFontSize = Math.min(currentFontSize + 2, 36);
  const content = document.querySelector('.chapter-content');
  if (content) content.style.fontSize = currentFontSize + 'px';
});

document.getElementById('smaller').addEventListener('click', () => {
  currentFontSize = Math.max(currentFontSize - 1, 14);
  const content = document.querySelector('.chapter-content');
  if (content) content.style.fontSize = currentFontSize + 'px';
});

async function loadReaderData() {
  try {
    const [chapters, chapter] = await Promise.all([
      fetchChapterList(novelId),
      fetchChapter(chapterId)
    ]);

    allChapters = chapters;

    if (!Array.isArray(allChapters)) {
      throw new Error("Could not load chapter list.");
    }

    if (!chapter || !chapter.id) {
      window.location.href = 'index.html';
      return;
    }

    currentChapter = chapter;
    document.title = chapter.title + ' - TommyTranslates';

    if (novelId) {
      document.getElementById('novel-link').href = 'novel.html?id=' + novelId;
    }

    renderChapter(chapter);
    prefetchSurroundingChapters();

  } catch (err) {
    document.getElementById('reader-body').innerHTML =
      '<p style="padding:2rem;color:red">Could not load chapter: ' + err.message + '</p>';
  }
}

function renderChapter(chapter) {
  const paragraphs = chapter.content
    .split(/\n\s*\n/)
    .map(p => p.trim())
    .filter(p => p.length)
    .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
    .join('');

  const idx = allChapters.findIndex(c => c.id === chapter.id);
  const prev = allChapters[idx - 1];
  const next = allChapters[idx + 1];

  document.getElementById('reader-body').innerHTML = `
    <h2>${chapter.title}</h2>
    <br/>
    <div class="chapter-content" style="font-size:${currentFontSize}px">
      ${paragraphs}
    </div>
    <nav class="reader-nav center-align padding on-primary-container">
      <a href="${prev ? `reader.html?id=${prev.id}&novel=${novelId}` : '#'}"
         class="fill max vertical responsive ${!prev ? 'disabled' : ''}"
         ${!prev ? 'style="pointer-events:none;"' : ''}
         ${prev ? `onclick="navigateTo(event,'${prev.id}')"` : ''}>
        <i>arrow_back</i>
        <span>Previous</span>
      </a>
      <a href="novel.html?id=${novelId}" class="fill max vertical responsive">
        <i>list</i>
        <span>Chapters</span>
      </a>
      <a href="${next ? `reader.html?id=${next.id}&novel=${novelId}` : '#'}"
         class="fill vertical max responsive ${!next ? 'disabled' : ''}"
         ${!next ? 'style="pointer-events:none;"' : ''}
         ${next ? `onclick="navigateTo(event,'${next.id}')"` : ''}>
        <span>Next</span>
        <i>arrow_forward</i>
      </a>
    </nav>
  `;
}

// ── Navigate without a full page reload, using the cache ──
async function navigateTo(event, targetChapterId) {
  event.preventDefault();

  const newUrl = `reader.html?id=${targetChapterId}&novel=${novelId}`;
  window.history.pushState({}, '', newUrl);

  document.getElementById('reader-body').innerHTML = '<div class="loading">Loading chapter...</div>';

  const chapter = await fetchChapter(targetChapterId);
  if (!chapter || !chapter.id) {
    window.location.href = 'index.html';
    return;
  }

  currentChapter = chapter;
  document.title = chapter.title + ' - TommyTranslates';
  renderChapter(chapter);
  prefetchSurroundingChapters();
  window.scrollTo(0, 0);
}

function prefetchSurroundingChapters() {
  const idx = allChapters.findIndex(c => c.id === currentChapter.id);
  if (idx === -1) return;

  [idx - 1, idx + 1, idx + 2, idx + 3].forEach(i => {
    if (i >= 0 && i < allChapters.length) {
      const targetId = allChapters[i].id;
      if (!chapterCache[targetId]) {
        fetchChapter(targetId);
      }
    }
  });
}

loadReaderData();
</script>
</body>
</html>
